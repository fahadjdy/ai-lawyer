name: Deploy to FTP (lexcase.fahad-jadiya.com)

# Kab chale: main branch par push hote hi, ya manually "Run workflow" se.
on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ftp-deploy
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1) Code checkout
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2) PHP 8.4 setup
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: mbstring, bcmath, ctype, fileinfo, json, openssl, pdo, tokenizer, xml, curl, redis
          coverage: none

      # 3) Composer (production) install
      - name: Install Composer dependencies
        run: composer install --no-dev --optimize-autoloader --prefer-dist --no-interaction --no-progress

      # 4) Node setup
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      # 5) Frontend dependencies + build (Vite -> public/build)
      - name: Install NPM dependencies
        run: npm ci

      - name: Build frontend assets
        run: npm run build

      # 6) FTP upload (sirf changed files; state file server par rehti hai)
      - name: Deploy via FTPS
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftp           # FTPS data-channel drop kar raha tha; plain FTP par stable
          port: 21
          server-dir: /lexcase.fahad-jadiya.com/
          timeout: 600000         # 10 min — bade upload par drop na ho
          log-level: verbose      # debug ke liye; sab theek hone par hata dena
          # Niche di hui cheezein upload NahI hongi:
          exclude: |
            **/.git*
            **/.git*/**
            **/.github/**
            **/node_modules/**
            **/tests/**
            **/.editorconfig
            **/.gitignore
            **/.gitattributes
            **/.env
            **/.env.*
            **/.ftp-deploy-sync-state.json
            **/README.md
            **/phpunit.xml
            **/presentation/**
            # NOTE: storage/ ko exclude NAHI karte — warna framework/views,
            # framework/sessions, logs folders server par bante nahi aur Laravel
            # 500 deta hai. Repo me sirf .gitignore placeholders hain (runtime
            # data gitignored hai), to ye sirf folder-structure banata hai.
